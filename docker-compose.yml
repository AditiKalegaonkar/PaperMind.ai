version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      VITE_NODE_API: http://node-backend:5000
      VITE_PYTHON_API: http://python-backend:8000
    depends_on:
      - node-backend
      - python-backend
    networks:
      - papermind-network

  node-backend:
    build:
      context: .
      dockerfile: Dockerfile.node
    command: node server.js
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/papermind
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      - mongo
    networks:
      - papermind-network

  python-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_GENAI_USE_VERTEXAI: "FALSE"
      MONGO_URI: mongodb://mongo:27017/papermind
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./backend/agents/.env:/app/agents/.env:ro
    depends_on:
      - mongo
      - qdrant
    networks:
      - papermind-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: papermind
    networks:
      - papermind-network

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - papermind-network

volumes:
  mongo-data:
  qdrant-data:

networks:
  papermind-network:
    driver: bridge
